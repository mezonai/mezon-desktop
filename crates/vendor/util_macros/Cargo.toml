[package]
name = "util_macros"
version = "0.1.0"
edition = "2024"
publish = false
license = "Apache-2.0"
description = "Utility macros for Zed"

[lib]
path = "src/util_macros.rs"
proc-macro = true
doctest = false

[dependencies]
quote.workspace = true
syn.workspace = true
perf = { path = "../perf" }

[features]
perf-enabled = []

[lints.rust]
warnings = "allow"
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(perf_enabled)'] }

[lints.clippy]
all = "allow"

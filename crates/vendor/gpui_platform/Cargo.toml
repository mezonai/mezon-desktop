[package]
name = "gpui_platform"
version = "0.1.0"
edition = "2024"
publish = false
license = "Apache-2.0"

[lib]
path = "src/gpui_platform.rs"

[features]
default = []
font-kit = ["gpui_macos/font-kit"]
test-support = ["gpui/test-support", "gpui_macos/test-support"]
screen-capture = ["gpui/screen-capture", "gpui_macos/screen-capture", "gpui_windows/screen-capture", "gpui_linux/screen-capture"]
runtime_shaders = ["gpui_macos/runtime_shaders"]
wayland = ["gpui_linux/wayland"]
x11 = ["gpui_linux/x11"]

[dependencies]
gpui = { path = "../gpui" }

[target.'cfg(target_os = "macos")'.dependencies]
gpui_macos = { path = "../gpui_macos" }

[target.'cfg(target_os = "windows")'.dependencies]
gpui_windows = { path = "../gpui_windows" }
gpui = { path = "../gpui", features = ["windows-manifest"] }

[target.'cfg(any(target_os = "linux", target_os = "freebsd"))'.dependencies]
gpui_linux = { path = "../gpui_linux" }

[lints.rust]
warnings = "allow"

[lints.clippy]
all = "allow"
